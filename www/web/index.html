<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery</title>
  <link rel="stylesheet" href="/gallery/app.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__left">
      <div class="logo">Gallery</div>
      <input class="search" type="search" placeholder="Search (later)">
    </div>
    <div class="hdr__right" id="colBtns">
      <button class="btn" data-cols="1" aria-label="1 column">▮</button>
      <button class="btn is-on" data-cols="2" aria-label="2 columns">▮▮</button>
      <button class="btn" data-cols="3" aria-label="3 columns">▮▮▮</button>
    </div>
  </header>

  <main class="main">
    <div class="side-tab" id="sideTab" aria-label="open sidebar" title="Open filters">
      <div class="side-tab__icon">⚙</div>
    </div>

    <aside class="side" id="sidebar">
      <div class="side__top">
        <div class="side__title">Filter</div>
        <button class="side__close" id="sideClose" aria-label="close">×</button>
      </div>

      <div class="side__body">
        <div class="block">
          <div class="block__label">Per page (PC)</div>
          <div class="cselect" id="perPageSelect">
            <button class="cselect__btn" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="cselect__value" id="perPageValue">100</span>
              <span class="cselect__chev">▾</span>
            </button>
            <div class="cselect__menu" role="listbox">
              <button class="cselect__opt" type="button" data-value="50">50</button>
              <button class="cselect__opt" type="button" data-value="100">100</button>
              <button class="cselect__opt" type="button" data-value="150">150</button>
              <button class="cselect__opt" type="button" data-value="200">200</button>
            </div>
          </div>
        </div>

        <div class="block">
          <div class="block__label">Tags</div>

          <div class="tagmode">
            <button class="tbtn is-on" id="tagModeOr" type="button">OR</button>
            <button class="tbtn" id="tagModeAnd" type="button">AND</button>
          </div>

          <div class="tagselected" id="tagSelected"></div>

          <div class="taglistwrap">
            <div class="taglist" id="tagList"></div>
          </div>

          <button class="moreline" id="tagMore" type="button" style="display:none">More</button>
        </div>

        <div class="block">
          <div class="block__label">Colors (top3)</div>

          <div class="tagmode">
            <button class="tbtn is-on" id="colorModeOr" type="button">OR</button>
            <button class="tbtn" id="colorModeAnd" type="button">AND</button>
          </div>

          <div class="tagselected" id="colorSelected"></div>

          <div class="colorwrap">
            <div class="colorlist" id="colorList"></div>
          </div>
        </div>

        <div class="block">
          <div class="block__label">Date</div>
          <div class="dategrid">
            <div class="datefield">
              <div class="datelabel">From</div>
              <input class="dateinp" id="dateFrom" type="date">
            </div>
            <div class="datefield">
              <div class="datelabel">To</div>
              <input class="dateinp" id="dateTo" type="date">
            </div>
          </div>
          <button class="clearline" id="dateClear" type="button">Clear</button>
        </div>
      </div>
    </aside>

    <div class="content" id="content">
      <div class="toprow">
        <div class="toprow__left">
          <div class="titleline" id="titleline">All Images</div>

          <div class="sortwrap">
            <div class="sortlabel">Sort</div>
            <div class="cselect cselect--compact" id="sortSelect">
              <button class="cselect__btn" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span class="cselect__value" id="sortValue">Latest</span>
                <span class="cselect__chev">▾</span>
              </button>
              <div class="cselect__menu" role="listbox">
                <button class="cselect__opt" type="button" data-value="latest">Latest</button>
                <button class="cselect__opt" type="button" data-value="oldest">Oldest</button>
              </div>
            </div>
          </div>
        </div>

        <div class="pager" id="pagerTop"></div>
      </div>

      <div class="grid cols-2" id="grid"></div>

      <div class="pager pager--bottom" id="pagerBottom"></div>
    </div>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lb__bg" id="lbBg"></div>
    <img class="lb__img" id="lbImg" alt="">
    <button class="lb__x" id="lbX" aria-label="close">×</button>
    <div class="lb__bar" id="lbBar">
      <div class="lb__meta" id="lbMeta"></div>
      <button class="lb__more" id="lbMore" aria-label="details">…</button>
    </div>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__bg" id="mBg"></div>
    <div class="modal__panel">
      <div class="modal__top">
        <div class="modal__title" id="mTitle">Details</div>
        <button class="modal__x" id="mX" aria-label="close">×</button>
      </div>
      <div class="modal__body" id="mBody"></div>
    </div>
  </div>

  <div class="tagmodal" id="tagModal" aria-hidden="true">
    <div class="tagmodal__bg" id="tmBg"></div>
    <div class="tagmodal__panel">
      <div class="tagmodal__top">
        <div class="tagmodal__title">Tags</div>
        <button class="tagmodal__x" id="tmX" aria-label="close">×</button>
      </div>
      <div class="tagmodal__body" id="tmBody"></div>
    </div>
  </div>

  <script src="/gallery/app.js"></script>
</body>
</html>
