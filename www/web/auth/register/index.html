<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VRChat Gallery - Register</title>
  <link rel="stylesheet" href="/gallery/assets/css/common.css">
  <link rel="stylesheet" href="/gallery/assets/css/page-auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in authhdr__in">
      <div class="hdr__l authhdr__l">
        <a class="hdr__title authhdr__title" href="/gallery/">
          <span class="authhdr__logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
              <path d="M7 7h2l1-2h4l1 2h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M12 18a4.2 4.2 0 1 0 0-8.4A4.2 4.2 0 0 0 12 18Z" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </span>
          <span class="authhdr__brand">VRChat Gallery</span>
          <span class="authhdr__path">/gallery/auth/register</span>
        </a>
      </div>
      <div class="hdr__r authhdr__r">
        <a class="authhdr__back" href="/gallery/auth/">
          <span class="authhdr__backic" aria-hidden="true">←</span>
          <span>Back to Login</span>
        </a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <div class="authwrap">
      <div class="authhero">
        <h1 class="authhero__ttl">新規アカウント作成</h1>
        <div class="authhero__sub">確認メールを送信します。メールのリンクを開いて続行してください。</div>
      </div>

      <section class="authcard">
        <div class="authcard__cap">メール登録</div>

        <form id="regForm" class="authform" autocomplete="on">
          <label class="sr" for="regEmail">メールアドレス</label>
          <input id="regEmail" class="authinp" type="email" placeholder="メールアドレス" required maxlength="255" autocomplete="email">

          <label class="sr" for="regPassword">パスワード</label>
          <input id="regPassword" class="authinp" type="password" placeholder="パスワード（8文字以上）" required minlength="8" maxlength="200" autocomplete="new-password">

          <label class="sr" for="regPassword2">パスワード（確認）</label>
          <input id="regPassword2" class="authinp" type="password" placeholder="パスワード（確認）" required minlength="8" maxlength="200" autocomplete="new-password">

          <button id="regBtn" class="authbtn authbtn--primary" type="submit">確認メールを送信</button>

          <div class="authlinks">
            <a id="regBackLogin" class="authlink" href="/gallery/auth/">ログインへ戻る</a>
          </div>

          <div id="regDevLink" style="display:none"></div>
        </form>
      </section>
    </div>
  </main>

  <script src="/gallery/auth/register/register.js"></script>
</body>
</html>
