<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/toast.css">
  <link rel="stylesheet" href="/gallery/auth/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in">
      <div class="hdr__l">
        <a class="hdr__title" href="/gallery/">Felixxsv Gallery</a>
        <div class="authhdr__path">/gallery/auth</div>
      </div>
      <div class="hdr__r">
        <a class="authhdr__back" href="/gallery/">← Back to Gallery</a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <div class="authwrap">
      <section class="authhero" aria-label="Sign in hero">
        <h1 class="authhero__title">サインインの方法を選択</h1>
        <p class="authhero__sub">サインイン方法を選んで続行してください。</p>
      </section>

      <section class="authgrid" aria-label="Sign in options">
        <div class="authcard authcard--discord" aria-label="Discord sign in">
          <div class="authcard__head">
            <div class="authcard__title">Continue with Discord</div>
          </div>

          <button id="authDiscordBtn" class="authbtn authbtn--discord" type="button">
            <span class="authbtn__icon" aria-hidden="true">⟡</span>
            Discordで続行
          </button>

          <div class="authcard__note">Discordのアカウントで簡単にサインインできます。</div>
        </div>

        <div class="authcard authcard--email" aria-label="Email sign in">
          <div class="authcard__head">
            <div class="authcard__title">メールアドレス</div>
          </div>

          <form id="authLoginForm" class="authform" autocomplete="on">
            <input id="authLoginEmail" class="authinp" name="email" type="email" placeholder="メールアドレス" required maxlength="255" autocomplete="email">
            <input id="authLoginPassword" class="authinp" name="password" type="password" placeholder="パスワード" required minlength="8" maxlength="200" autocomplete="current-password">

            <button id="authLoginBtn" class="authbtn authbtn--primary" type="submit">ログイン</button>

            <div class="authrow authrow--links">
              <button id="authForgotBtn" class="authlink" type="button">パスワードをお忘れですか？</button>
              <button id="authOpenRegister" class="authlink" type="button">新規アカウント作成</button>
            </div>

            <div class="authhint">
              next: <span id="authNextLabel"></span>
            </div>
          </form>
        </div>
      </section>

      <section class="authcard authcard--register" aria-label="Register">
        <button id="authRegisterToggle" class="authreghead" type="button" aria-expanded="false" aria-controls="authRegisterPanel">
          <span class="authreghead__icon" aria-hidden="true">✉</span>
          <span class="authreghead__text">
            <span class="authreghead__title">新規アカウント作成</span>
            <span class="authreghead__sub">メールアドレスを登録して新しいアカウントを作成します。</span>
          </span>
          <span class="authreghead__chev" aria-hidden="true">▾</span>
        </button>

        <div id="authRegisterPanel" class="authregpanel" aria-hidden="true">
          <form id="authRegisterForm" class="authform authform--register" autocomplete="on">
            <div class="authgrid2">
              <div class="authfield">
                <label class="authlabel" for="authRegUserKey">User Key</label>
                <input id="authRegUserKey" class="authinp" name="user_key" type="text" required minlength="4" maxlength="20" autocomplete="username" inputmode="latin" pattern="[A-Za-z][A-Za-z0-9_-]{3,19}">
                <div class="authsub">4-20文字 / 先頭英字 / 英数字・_・-</div>
              </div>

              <div class="authfield">
                <label class="authlabel" for="authRegDisplayName">Display Name</label>
                <input id="authRegDisplayName" class="authinp" name="display_name" type="text" maxlength="128" autocomplete="nickname">
                <div class="authsub">空の場合は User Key を使用します</div>
              </div>
            </div>

            <div class="authfield">
              <label class="authlabel" for="authRegEmail">Email</label>
              <input id="authRegEmail" class="authinp" name="email" type="email" required maxlength="255" autocomplete="email">
            </div>

            <div class="authfield">
              <label class="authlabel" for="authRegPassword">Password</label>
              <input id="authRegPassword" class="authinp" name="password" type="password" required minlength="8" maxlength="200" autocomplete="new-password">
            </div>

            <div class="authrow">
              <button id="authRegisterBtn" class="authbtn authbtn--primary" type="submit">登録して続行</button>
              <button id="authCloseRegister" class="authbtn" type="button">閉じる</button>
            </div>

            <div class="authsub authsub--note">Register → 自動ログイン → next へ遷移します</div>
          </form>
        </div>

        <div class="authfoot">
          <button id="authLogoutBtn" class="authbtn authbtn--danger" type="button" style="display:none">Logout</button>
        </div>
      </section>
    </div>
  </main>

  <script src="/gallery/auth/auth.js"></script>
</body>
</html>
