<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/toast.css">
  <link rel="stylesheet" href="/gallery/auth/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in">
      <div class="hdr__l">
        <a class="hdr__title" href="/gallery/">Felixxsv Gallery</a>
        <div class="authcrumb">Auth</div>
      </div>
      <div class="hdr__r">
        <a class="hdrbtn" href="/gallery/" aria-label="Close">×</a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <section class="authcard" aria-label="Authentication">
      <div class="authtop">
        <div class="authtabs" role="tablist" aria-label="Auth tabs">
          <button id="authTabLogin" class="authtab is-on" type="button" role="tab" aria-selected="true" aria-controls="authPanelLogin">Login</button>
          <button id="authTabRegister" class="authtab" type="button" role="tab" aria-selected="false" aria-controls="authPanelRegister">Register</button>
        </div>
        <div id="authMeLine" class="authme" aria-live="polite"></div>
      </div>

      <div class="authbody">
        <section id="authPanelLogin" class="authpanel is-on" role="tabpanel" aria-labelledby="authTabLogin">
          <form id="authLoginForm" class="authform" autocomplete="on">
            <div class="afield">
              <label class="alabel" for="authLoginEmail">Email</label>
              <input id="authLoginEmail" class="ainp" name="email" type="email" required maxlength="255" autocomplete="email">
            </div>

            <div class="afield">
              <label class="alabel" for="authLoginPassword">Password</label>
              <input id="authLoginPassword" class="ainp" name="password" type="password" required minlength="8" maxlength="200" autocomplete="current-password">
            </div>

            <div class="arow">
              <button id="authLoginBtn" class="abtn abtn--primary" type="submit">Login</button>
              <button id="authGotoRegister" class="abtn" type="button">Create account</button>
            </div>

            <div class="ahint">
              next: <span id="authNextLabel"></span>
            </div>
          </form>
        </section>

        <section id="authPanelRegister" class="authpanel" role="tabpanel" aria-labelledby="authTabRegister">
          <form id="authRegisterForm" class="authform" autocomplete="on">
            <div class="agrid2">
              <div class="afield">
                <label class="alabel" for="authRegUserKey">User Key</label>
                <input id="authRegUserKey" class="ainp" name="user_key" type="text" required minlength="4" maxlength="20" autocomplete="username" inputmode="latin" pattern="[A-Za-z][A-Za-z0-9_-]{3,19}">
                <div class="asub">4-20文字 / 先頭英字 / 英数字・_・-</div>
              </div>

              <div class="afield">
                <label class="alabel" for="authRegDisplayName">Display Name</label>
                <input id="authRegDisplayName" class="ainp" name="display_name" type="text" maxlength="128" autocomplete="nickname">
                <div class="asub">空の場合は User Key を使用します</div>
              </div>
            </div>

            <div class="afield">
              <label class="alabel" for="authRegEmail">Email</label>
              <input id="authRegEmail" class="ainp" name="email" type="email" required maxlength="255" autocomplete="email">
            </div>

            <div class="afield">
              <label class="alabel" for="authRegPassword">Password</label>
              <input id="authRegPassword" class="ainp" name="password" type="password" required minlength="8" maxlength="200" autocomplete="new-password">
            </div>

            <div class="arow">
              <button id="authRegisterBtn" class="abtn abtn--primary" type="submit">Register</button>
              <button id="authGotoLogin" class="abtn" type="button">Back to login</button>
            </div>

            <div class="ahint">
              Register → 自動ログイン → next へ遷移します
            </div>
          </form>
        </section>
      </div>

      <div class="authfoot">
        <button id="authLogoutBtn" class="abtn abtn--danger" type="button" style="display:none">Logout</button>
      </div>
    </section>
  </main>

  <script src="/gallery/auth/auth.js"></script>
</body>
</html>
