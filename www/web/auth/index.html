<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VRChat Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/toast.css">
  <link rel="stylesheet" href="/gallery/auth/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in">
      <div class="hdr__l">
        <a class="hdr__title authbrand" href="/gallery/">
          <span class="authbrand__icon" aria-hidden="true">📷</span>
          <span class="authbrand__text">VRChat Gallery</span>
        </a>
        <div class="authpath">/gallery/auth</div>
      </div>
      <div class="hdr__r">
        <a class="authback" href="/gallery/"><span aria-hidden="true">←</span> Back to Gallery</a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <div class="authwrap">
      <section class="authhero" aria-label="Auth hero">
        <h1 class="authhero__title">サインインの方法を選択</h1>
        <div class="authhero__sub">サインイン方法を選んで続行してください。</div>
      </section>

      <section class="authgrid" aria-label="Auth methods">
        <section class="authbox authbox--discord" aria-label="Discord login">
          <div class="authbox__cap">Continue with Discord</div>
          <button id="authDiscordBtn" class="abtn abtn--discord" type="button">
            <span class="abtn__icon" aria-hidden="true">Discord</span>
            <span>Discordで続行</span>
          </button>
          <div class="authbox__note">Discordのアカウントで簡単にサインインできます。</div>
        </section>

        <section class="authbox authbox--email" aria-label="Email login">
          <div class="authbox__cap">メールアドレス</div>

          <form id="authLoginForm" class="authform" autocomplete="on">
            <input id="authLoginEmail" class="ainp" name="email" type="email" required maxlength="255" autocomplete="email" placeholder="メールアドレス">
            <input id="authLoginPassword" class="ainp" name="password" type="password" required minlength="8" maxlength="200" autocomplete="current-password" placeholder="パスワード">

            <button id="authLoginBtn" class="abtn abtn--primary" type="submit">ログイン</button>

            <div class="authlinks">
              <button id="authForgotBtn" class="alink" type="button">パスワードをお忘れですか？</button>
              <button id="authJumpRegister" class="alink" type="button">新規アカウント作成</button>
            </div>

            <div class="authnext">next: <span id="authNextLabel"></span></div>
          </form>
        </section>
      </section>

      <section id="authRegisterBox" class="authbox authbox--register" aria-label="Register">
        <button id="authRegisterToggle" class="authreghead" type="button">
          <div class="authreghead__icon" aria-hidden="true">✉</div>
          <div class="authreghead__txt">
            <div class="authreghead__title">新規アカウント作成</div>
            <div class="authreghead__sub">メールアドレスを登録して新しいアカウントを作成します。</div>
          </div>
        </button>

        <div id="authRegisterBody" class="authregbody" aria-hidden="true">
          <form id="authRegisterForm" class="authform" autocomplete="on">
            <div class="agrid2">
              <div class="afield">
                <div class="alabel">User Key</div>
                <input id="authRegUserKey" class="ainp" name="user_key" type="text" required minlength="4" maxlength="20" autocomplete="username" inputmode="latin" pattern="[A-Za-z][A-Za-z0-9_-]{3,19}" placeholder="user_key">
                <div class="asub">4-20文字 / 先頭英字 / 英数字・_・-</div>
              </div>

              <div class="afield">
                <div class="alabel">Display Name</div>
                <input id="authRegDisplayName" class="ainp" name="display_name" type="text" maxlength="128" autocomplete="nickname" placeholder="任意">
                <div class="asub">空の場合は User Key を使用します</div>
              </div>
            </div>

            <div class="afield">
              <div class="alabel">Email</div>
              <input id="authRegEmail" class="ainp" name="email" type="email" required maxlength="255" autocomplete="email" placeholder="メールアドレス">
            </div>

            <div class="afield">
              <div class="alabel">Password</div>
              <input id="authRegPassword" class="ainp" name="password" type="password" required minlength="8" maxlength="200" autocomplete="new-password" placeholder="8文字以上">
            </div>

            <div class="authregactions">
              <button id="authRegisterBtn" class="abtn abtn--primary" type="submit">作成してログイン</button>
              <button id="authRegisterClose" class="abtn" type="button">閉じる</button>
            </div>

            <div class="asub">作成後、自動ログインして next に遷移します。</div>
          </form>
        </div>
      </section>

      <div class="authfoot">
        <button id="authLogoutBtn" class="abtn abtn--danger" type="button" style="display:none">Logout</button>
      </div>
    </div>
  </main>

  <script src="/gallery/auth/auth.js"></script>
</body>
</html>
