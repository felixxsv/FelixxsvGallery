<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VRChat Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/toast.css">
  <link rel="stylesheet" href="/gallery/auth/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in authhdr__in">
      <div class="hdr__l authhdr__l">
        <a class="hdr__title authhdr__title" href="/gallery/">
          <span class="authhdr__logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
              <path d="M7 7h2l1-2h4l1 2h2a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M12 18a4.2 4.2 0 1 0 0-8.4A4.2 4.2 0 0 0 12 18Z" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </span>
          <span class="authhdr__brand">VRChat Gallery</span>
          <span class="authhdr__path">/gallery/auth</span>
        </a>
      </div>
      <div class="hdr__r authhdr__r">
        <a class="authhdr__back" href="/gallery/">
          <span class="authhdr__backic" aria-hidden="true">←</span>
          <span>Back to Gallery</span>
        </a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <div class="authwrap">
      <div class="authhero">
        <h1 class="authhero__ttl">ログイン方法を選択</h1>
        <div class="authhero__sub">ログイン方法を選んで続行してください。</div>
      </div>

      <div class="authgrid">
        <section class="authcard">
          <div class="authcard__cap">Continue with Discord</div>
          <button id="authDiscordBtn" class="authbtn authbtn--discord" type="button">
            <span class="authbtn__ic" aria-hidden="true">
              <svg viewBox="0 0 256 199" width="22" height="22" fill="currentColor">
                <path d="M216.9 16.5A208.1 208.1 0 0 0 164.1 0a145.6 145.6 0 0 0-6.8 13.8 193.6 193.6 0 0 0-58.6 0A145.6 145.6 0 0 0 92 0a207.7 207.7 0 0 0-52.9 16.5C6.7 66.2-2.2 114.5 2.2 162.2A210.2 210.2 0 0 0 64 199a152.3 152.3 0 0 0 13.6-22.1 135.6 135.6 0 0 1-21.4-10.2c1.8-1.3 3.5-2.7 5.1-4.2a150.4 150.4 0 0 0 133.4 0c1.7 1.5 3.4 2.9 5.1 4.2a135.6 135.6 0 0 1-21.4 10.2A152.3 152.3 0 0 0 192 199a210.2 210.2 0 0 0 61.8-36.8c5.1-55.3-8.6-103.2-36.9-145.7ZM85.5 134.4c-12.3 0-22.4-11.3-22.4-25.2 0-13.9 9.9-25.2 22.4-25.2 12.5 0 22.6 11.3 22.4 25.2 0 13.9-9.9 25.2-22.4 25.2Zm85 0c-12.3 0-22.4-11.3-22.4-25.2 0-13.9 9.9-25.2 22.4-25.2 12.5 0 22.6 11.3 22.4 25.2 0 13.9-9.9 25.2-22.4 25.2Z"/>
              </svg>
            </span>
            <span>Discordで続行</span>
          </button>
          <div class="authcard__desc">Discordのアカウントでログインします。</div>
        </section>

        <section class="authcard">
          <div class="authcard__cap">メールアドレス</div>

          <form id="authEmailForm" class="authform" autocomplete="on">
            <label class="sr" for="authEmail">メールアドレス</label>
            <input id="authEmail" class="authinp" name="email" type="email" placeholder="メールアドレス" required maxlength="255" autocomplete="email">

            <label class="sr" for="authPassword">パスワード</label>
            <input id="authPassword" class="authinp" name="password" type="password" placeholder="パスワード" required minlength="8" maxlength="200" autocomplete="current-password">

            <button id="authLoginBtn" class="authbtn authbtn--primary" type="submit">ログイン</button>

            <div class="authlinks">
              <a id="authForgotLink" class="authlink" href="/gallery/auth/reset/">パスワードをお忘れですか？</a>
              <a id="authCreateMini" class="authlink" href="/gallery/auth/register/">新規アカウント作成</a>
            </div>
          </form>
        </section>
      </div>

      <a id="authCreateLink" class="authcreate" href="/gallery/auth/register/">
        <span class="authcreate__ic" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M7.5 8.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M8 13h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M12 10.5v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="authcreate__txt">
          <div class="authcreate__ttl">新規アカウント作成</div>
          <div class="authcreate__sub">メールアドレスを登録して新しいアカウントを作成します。</div>
        </div>
      </a>
    </div>
  </main>

  <script src="/gallery/auth/auth.js"></script>
</body>
</html>
