<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VRChat Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/toast.css">
  <link rel="stylesheet" href="/gallery/auth/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__in">
      <div class="hdr__l">
        <a class="brand" href="/gallery/" aria-label="VRChat Gallery">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M4.5 8.2c0-1.5 1.2-2.7 2.7-2.7h9.6c1.5 0 2.7 1.2 2.7 2.7v7.6c0 1.5-1.2 2.7-2.7 2.7H7.2c-1.5 0-2.7-1.2-2.7-2.7V8.2Z" stroke="rgba(231,238,247,.92)" stroke-width="1.4"/>
              <path d="M8 9.6h1.2M14.8 9.6H16" stroke="rgba(231,238,247,.92)" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M12 12.3c1.9 0 3.4 1.4 3.4 3.1" stroke="rgba(231,238,247,.92)" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M12 12.3c-1.9 0-3.4 1.4-3.4 3.1" stroke="rgba(231,238,247,.92)" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="brand__name">VRChat Gallery</span>
        </a>
        <div class="hdr__path">/gallery/auth</div>
      </div>

      <div class="hdr__r">
        <a class="hdr__back" href="/gallery/">
          <span class="hdr__backarrow" aria-hidden="true">←</span>
          <span>Back to Gallery</span>
        </a>
      </div>
    </div>
  </header>

  <main class="authmain">
    <div class="authwrap">
      <section class="authhero" aria-label="Login hero">
        <h1 class="authhero__title">ログイン方法を選択</h1>
        <p class="authhero__sub">ログイン方法を選んで続行してください。</p>
      </section>

      <section class="authgrid" aria-label="Login methods">
        <section class="authcard" aria-label="Discord login">
          <div class="authcard__title">Continue with Discord</div>

          <button id="authDiscordBtn" class="authbtn authbtn--discord" type="button">
            <span class="authbtn__icon" aria-hidden="true">
              <svg viewBox="0 0 256 199" width="22" height="22" fill="none">
                <path d="M216.9 16.5A208.5 208.5 0 0 0 164.7 0c-2.2 4-4.7 9.5-6.4 13.8a193.8 193.8 0 0 0-60.7 0C95.9 9.5 93.3 4 91.1 0A208.1 208.1 0 0 0 38.9 16.5C5.4 65.9-3.7 114 0.8 161.2c22.2 16.6 43.8 26.7 65 33.3 5.2-7.2 9.8-14.9 13.8-23a134.2 134.2 0 0 1-21.7-10.4c1.8-1.3 3.6-2.7 5.3-4.1 41.8 19.5 87.2 19.5 128.5 0 1.8 1.4 3.6 2.8 5.4 4.1a134.4 134.4 0 0 1-21.8 10.4c4 8.1 8.6 15.8 13.8 23 21.3-6.6 42.9-16.7 65.1-33.3 5.2-54.9-8.9-102.6-37.2-144.7Z" fill="rgba(231,238,247,.92)"/>
                <path d="M85.9 135.4c-12.5 0-22.7-11.5-22.7-25.7 0-14.1 10-25.6 22.7-25.6 12.7 0 22.9 11.6 22.7 25.7 0 14.2-10 25.6-22.7 25.6Zm84.2 0c-12.5 0-22.7-11.5-22.7-25.7 0-14.1 10-25.6 22.7-25.6 12.7 0 22.9 11.6 22.7 25.7 0 14.2-10 25.6-22.7 25.6Z" fill="rgba(14,18,26,.92)"/>
              </svg>
            </span>
            <span>Discordで続行</span>
          </button>

          <div class="authcard__note">Discordのアカウントで簡単にログインできます。</div>
        </section>

        <section class="authcard" aria-label="Email login">
          <div class="authcard__title">メールアドレス</div>

          <form id="authLoginForm" class="authform" autocomplete="on">
            <input id="authLoginId" class="authinp" name="identifier" type="text" placeholder="メールアドレス または ユーザーID" autocomplete="username" required>
            <input id="authLoginPassword" class="authinp" name="password" type="password" placeholder="パスワード" autocomplete="current-password" required>
            <button id="authLoginBtn" class="authbtn authbtn--primary" type="submit">ログイン</button>
            <div class="authlinks">
              <a class="authlink" href="/gallery/">パスワードを忘れた</a>
            </div>
          </form>
        </section>
      </section>

      <section class="authcta" aria-label="Create account">
        <div class="authcta__in">
          <div class="authcta__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
              <path d="M4 7.5c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2v-9Z" stroke="rgba(231,238,247,.92)" stroke-width="1.4"/>
              <path d="m5.6 8.2 6.1 5.1c.2.2.5.2.7 0l6.1-5.1" stroke="rgba(231,238,247,.92)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <div class="authcta__body">
            <div class="authcta__title">新規アカウント作成</div>
            <div class="authcta__sub">メールアドレスを確認してから新しいアカウントを作成します。</div>
          </div>

          <a id="authRegisterLink" class="authcta__btn" href="/gallery/auth/register/">作成へ進む</a>
        </div>
      </section>
    </div>
  </main>

  <script src="/gallery/auth/auth.js"></script>
</body>
</html>
