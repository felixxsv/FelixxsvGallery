<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title data-i18n="auth.meta.title">Felixxsv Gallery</title>
  <link rel="stylesheet" href="/gallery/assets/css/common.css">
  <link rel="stylesheet" href="/gallery/assets/css/components.css">
  <link rel="stylesheet" href="/gallery/assets/css/page/auth.css">
</head>
<body class="app-page auth-page" data-app-base="/gallery">

  <header class="app-site-header">
    <div class="app-site-header__inner">
      <div class="app-site-header__left">
        <span class="auth-site-logo" aria-label="Felixxsv Gallery">
          <img class="app-site-logo__mark" src="/gallery/assets/icons/WolfLogoNOBG.png" alt="" aria-hidden="true">
          <span class="auth-site-logo__label">Felixxsv Gallery</span>
        </span>
      </div>
      <div class="app-site-header__right">
        <button id="authHeaderBackButton" class="app-button app-button--ghost app-button--small" type="button" data-i18n="auth.header.back">← ギャラリーへ</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-split">

      <!-- ── Left: hero slideshow ────────────────────────────────────────── -->
      <div class="auth-hero" aria-hidden="true">
        <div id="authHeroSlides" class="auth-hero__slides"></div>
        <div class="auth-hero__overlay">
          <div class="auth-hero__brand">
            <img class="auth-hero__brand-mark" src="/gallery/assets/icons/WolfLogoNOBG.png" alt="" aria-hidden="true">
            <span class="auth-hero__brand-name">Felixxsv Gallery</span>
          </div>
          <div class="auth-hero__sub" data-i18n="auth.hero.sub">VRChatの思い出を、ここに。</div>
        </div>
      </div>

      <!-- ── Right: form ────────────────────────────────────────────────── -->
      <div class="auth-form-side">

        <div class="auth-lang-bar">
          <select id="authLangSelect" class="app-select auth-lang-select" aria-label="言語を選択">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="auth-form-panel">

          <div class="auth-tabs" role="tablist">
            <button id="tabLogin" class="auth-tab is-on" type="button" role="tab" aria-selected="true" data-i18n="auth.tabs.login">ログイン</button>
            <button id="tabSignup" class="auth-tab" type="button" role="tab" aria-selected="false" data-i18n="auth.tabs.signup">新規登録</button>
          </div>

          <!-- ── Login pane ──────────────────────────────────────────── -->
          <div id="paneLogin" class="auth-pane is-on" role="tabpanel">

            <div id="loginStageCredentials">
              <div class="auth-field">
                <label class="auth-field__label" for="loginEmail" data-i18n="auth.fields.email">メールアドレス</label>
                <input id="loginEmail" class="app-input" type="email" autocomplete="email">
              </div>
              <div class="auth-field">
                <label class="auth-field__label" for="loginPass" data-i18n="auth.fields.password">パスワード</label>
                <input id="loginPass" class="app-input" type="password" autocomplete="current-password">
              </div>
              <button id="loginBtn" class="app-button app-button--primary auth-btn" type="button" data-i18n="auth.actions.login">ログイン</button>
              <div class="auth-divider"><span data-i18n="auth.common.or">または</span></div>
              <button id="loginDiscordBtn" class="app-button app-button--discord auth-btn" type="button" data-i18n="auth.actions.loginDiscord">Discordでログイン</button>
            </div>

            <div id="loginStageTwoFactor" hidden>
              <div id="loginTwoFactorMessage" class="auth-field__label" style="margin-bottom:14px">認証コードを入力してください。</div>
              <div class="auth-field">
                <label class="auth-field__label" for="loginTwoFactorCode" data-i18n="auth.fields.verificationCode">認証コード</label>
                <input id="loginTwoFactorCode" class="app-input" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
                <button id="loginTwoFactorVerifyBtn" class="app-button app-button--primary auth-btn" type="button" data-i18n="auth.actions.verify">確認</button>
                <button id="loginTwoFactorResendBtn" class="app-button app-button--ghost auth-btn" type="button">再送</button>
                <button id="loginBackBtn" class="app-button app-button--ghost auth-btn" type="button" data-i18n="auth.actions.back">戻る</button>
              </div>
            </div>

          </div>

          <!-- ── Signup pane ─────────────────────────────────────────── -->
          <div id="paneSignup" class="auth-pane" role="tabpanel">

            <div id="signupStageStart">
              <div class="auth-field">
                <label class="auth-field__label" for="signupEmail" data-i18n="auth.fields.email">メールアドレス</label>
                <input id="signupEmail" class="app-input" type="email" autocomplete="email">
              </div>
              <button id="signupStartBtn" class="app-button app-button--primary auth-btn" type="button" data-i18n="auth.actions.sendCode">認証コードを送信</button>
              <div class="auth-divider"><span data-i18n="auth.common.or">または</span></div>
              <button id="signupDiscordBtn" class="app-button app-button--discord auth-btn" type="button" data-i18n="auth.actions.signupDiscord">Discordで登録</button>
            </div>

            <div id="signupStageVerify" hidden>
              <div id="signupVerifyMessage" class="auth-field__label" style="margin-bottom:14px">メールに届いた認証コードを入力してください。</div>
              <div class="auth-field">
                <label class="auth-field__label" for="signupVerifyCode" data-i18n="auth.fields.verificationCode">認証コード</label>
                <input id="signupVerifyCode" class="app-input" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
                <button id="signupVerifyBtn" class="app-button app-button--primary auth-btn" type="button" data-i18n="auth.actions.verifyEmail">認証する</button>
                <button id="signupResendBtn" class="app-button app-button--ghost auth-btn" type="button">再送</button>
                <button id="signupRestartBtn" class="app-button app-button--ghost auth-btn" type="button" data-i18n="auth.actions.back">戻る</button>
              </div>
            </div>

            <div id="signupStageComplete" hidden>
              <div id="signupCompleteMessage" class="auth-field__label" style="margin-bottom:16px">アカウント情報を入力してください。</div>

              <div id="discordAvatarPreview" hidden>
                <div class="auth-discord-preview">
                  <img id="discordAvatarImg" class="auth-discord-preview__img" src="" alt="Discord avatar">
                  <span class="auth-discord-preview__note" data-i18n="auth.discord.previewNote">Discordのアイコンをプレビュー表示中。登録後に変更できます。</span>
                </div>
              </div>

              <div class="auth-field">
                <label class="auth-field__label" for="completeUserKey" data-i18n="auth.fields.userKey">ユーザーキー</label>
                <input id="completeUserKey" class="app-input" type="text" placeholder="4〜20文字 (A-Za-z0-9_-)" autocomplete="username" data-i18n-placeholder="auth.placeholders.userKey">
              </div>
              <div class="auth-field">
                <label class="auth-field__label" for="completeDisplayName" data-i18n="auth.fields.displayName">表示名</label>
                <input id="completeDisplayName" class="app-input" type="text">
              </div>
              <div id="completePasswordRow" class="auth-field">
                <label class="auth-field__label" for="completePassword" data-i18n="auth.fields.password">パスワード</label>
                <input id="completePassword" class="app-input" type="password" autocomplete="new-password">
              </div>
              <button id="completeRegisterBtn" class="app-button app-button--primary auth-btn" type="button" data-i18n="auth.actions.createAccount">アカウントを作成</button>
            </div>

          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- ── Confirm overlay ───────────────────────────────────────────────── -->
  <div id="authConfirmLayer" class="auth-confirm-overlay">
    <div class="auth-confirm-card">
      <div id="authConfirmTitle" class="auth-confirm-title" data-i18n="auth.confirm.title">確認</div>
      <div id="authConfirmMessage" class="auth-confirm-message" data-i18n="auth.confirm.defaultMessage">本当に実行しますか？</div>
      <div class="auth-confirm-actions">
        <button id="authConfirmApproveBtn" class="app-button app-button--primary" type="button" data-i18n="auth.actions.confirm">実行する</button>
        <button id="authConfirmCancelBtn" class="app-button app-button--ghost" type="button" data-i18n="auth.actions.cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="/gallery/assets/js/core/auth-hero-slideshow.js"></script>
  <script type="module" src="/gallery/assets/js/page/auth.js"></script>
</body>
</html>
