<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/assets/css/common.css">
  <link rel="stylesheet" href="/gallery/assets/css/page/auth.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__inner">
      <div class="hdr__left">
        <a class="hdr__logo" href="/gallery/">
          <span class="hdr__mark" aria-hidden="true"></span>
          <span class="hdr__title">Felixxsv Gallery</span>
        </a>
        <div class="hdr__crumb">Auth</div>
      </div>
      <div class="hdr__right">
        <button id="authHeaderBackButton" class="hdrbtn" type="button" aria-label="Back">←</button>
      </div>
    </div>
  </header>

  <main class="auth">
    <div class="authcard glass-strong">
      <div class="authtabs">
        <button id="tabLogin" class="btn btn-ghost is-on" type="button">Login</button>
        <button id="tabSignup" class="btn btn-ghost" type="button">新規登録</button>
      </div>

      <div id="paneLogin" class="authpane is-on">
        <div id="loginStageCredentials">
          <div class="label">Email</div>
          <input id="loginEmail" class="inp" type="email" autocomplete="email">

          <div class="label">Password</div>
          <input id="loginPass" class="inp" type="password" autocomplete="current-password">

          <button id="loginBtn" class="btn btn-primary authbtn" type="button">Login</button>

          <div class="authdivider"><span>または</span></div>

          <button id="loginDiscordBtn" class="btn btn-discord authbtn" type="button">Discordでログイン</button>
        </div>

        <div id="loginStageTwoFactor" hidden>
          <div id="loginTwoFactorMessage" class="label">認証コードを入力してください。</div>

          <div class="label">認証コード</div>
          <input id="loginTwoFactorCode" class="inp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code">

          <div class="row" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
            <button id="loginTwoFactorVerifyBtn" class="btn btn-primary authbtn" type="button">確認</button>
            <button id="loginTwoFactorResendBtn" class="btn btn-ghost authbtn" type="button">再送</button>
            <button id="loginBackBtn" class="btn btn-ghost authbtn" type="button">戻る</button>
          </div>
        </div>
      </div>

      <div id="paneSignup" class="authpane">
        <div id="signupStageStart">
          <div class="label">Email</div>
          <input id="signupEmail" class="inp" type="email" autocomplete="email">

          <button id="signupStartBtn" class="btn btn-primary authbtn" type="button">認証コードを送信</button>

          <div class="authdivider"><span>または</span></div>

          <button id="signupDiscordBtn" class="btn btn-discord authbtn" type="button">Discordで登録</button>
        </div>

        <div id="signupStageVerify" hidden>
          <div id="signupVerifyMessage" class="label">メールに届いた認証コードを入力してください。</div>

          <div class="label">認証コード</div>
          <input id="signupVerifyCode" class="inp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code">

          <div class="row" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
            <button id="signupVerifyBtn" class="btn btn-primary authbtn" type="button">認証する</button>
            <button id="signupResendBtn" class="btn btn-ghost authbtn" type="button">再送</button>
            <button id="signupRestartBtn" class="btn btn-ghost authbtn" type="button">戻る</button>
          </div>
        </div>

        <div id="signupStageComplete" hidden>
          <div id="signupCompleteMessage" class="label">アカウント情報を入力してください。</div>

          <div id="discordAvatarPreview" hidden style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <img id="discordAvatarImg" src="" alt="Discord avatar" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--color-border)">
            <span style="font-size:0.82rem;color:var(--color-text-muted)">Discordのアイコンをプレビュー表示中。登録後に変更できます。</span>
          </div>

          <div class="label">User Key</div>
          <input id="completeUserKey" class="inp" type="text" placeholder="4-20 chars (A-Za-z0-9_-)" autocomplete="username">

          <div class="label">Display Name</div>
          <input id="completeDisplayName" class="inp" type="text">

          <div id="completePasswordRow">
            <div class="label">Password</div>
            <input id="completePassword" class="inp" type="password" autocomplete="new-password">
          </div>

          <button id="completeRegisterBtn" class="btn btn-primary authbtn" type="button">アカウントを作成</button>
        </div>
      </div>
    </div>
  </main>

  <div id="authConfirmLayer" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1200;padding:20px;background:rgba(0,0,0,0.45)">
    <div class="authcard glass-strong" style="width:min(520px,100%);margin:0">
      <div id="authConfirmTitle" class="label" style="font-size:18px;font-weight:700">確認</div>
      <div id="authConfirmMessage" class="label" style="margin-top:12px;line-height:1.7">本当に実行しますか？</div>
      <div class="row" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">
        <button id="authConfirmApproveBtn" class="btn btn-primary authbtn" type="button">実行する</button>
        <button id="authConfirmCancelBtn" class="btn btn-ghost authbtn" type="button">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="/gallery/assets/js/page/auth.js"></script>
</body>
</html>
