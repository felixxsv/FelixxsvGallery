<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sorry - Felixxsv Gallery</title>
  <link rel="stylesheet" href="/gallery/assets/css/common.css">
  <link rel="stylesheet" href="/gallery/assets/css/components.css">
  <link rel="stylesheet" href="/gallery/assets/css/page/special-page.css">
</head>
<body
  class="app-page special-page"
  data-app-base="/gallery"
  data-page-kind="sorry"
  data-page-title="現在この導線は利用できません"
>
  <header class="app-site-header">
    <div class="app-site-header__inner">
      <div class="app-site-header__left">
        <a href="/gallery/" class="app-site-logo" aria-label="Felixxsv Gallery">
          <img class="app-site-logo__mark" src="/gallery/assets/icons/WolfLogoNOBG.png" alt="" aria-hidden="true">
          <span class="app-site-logo__label">Felixxsv Gallery</span>
        </a>
      </div>
    </div>
  </header>

  <main class="special-page__main">
    <div class="app-container">
      <div class="special-page__layout">
        <section class="special-page__panel" aria-labelledby="specialTitle">
          <div class="special-page__eyebrow">Sorry</div>
          <div class="special-page__status" id="specialStatusCode">INFO</div>
          <h1 class="special-page__title" id="specialTitle">現在この導線は利用できません</h1>
          <p class="special-page__description" id="specialDescription">
            閲覧制限、招待制、メンテナンス前の案内などで一時的に止めているページです。権限や公開状態を確認してください。
          </p>
          <div class="special-page__meta" id="specialMeta">404 や工事中とは別に、意図して案内を返したいケース向けです。</div>
          <div class="special-page__actions">
            <a class="app-button app-button--primary" href="/gallery/">ギャラリートップへ戻る</a>
            <a class="app-button" href="/gallery/auth/">ログイン画面へ</a>
          </div>
        </section>

        <aside class="special-page__aside" aria-label="利用不可の説明">
          <h2 class="special-page__aside-title">役割の切り分け</h2>
          <p class="special-page__aside-copy">存在しないページではなく、事情があって止めている導線を明示的に案内するためのページです。</p>
          <div class="special-page__list">
            <div class="special-page__list-item">
              <span class="special-page__list-label">404 との違い</span>
              <span class="special-page__list-value">URL 自体は想定されているが、今は利用不可と伝える</span>
            </div>
            <div class="special-page__list-item">
              <span class="special-page__list-label">工事中との違い</span>
              <span class="special-page__list-value">作業中に限らず、制限や案内目的でも使える</span>
            </div>
            <div class="special-page__list-item">
              <span class="special-page__list-label">導線</span>
              <span class="special-page__list-value">トップや認証画面へ自然に戻せる構成にする</span>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module" src="/gallery/assets/js/page/special-page.js"></script>
</body>
</html>
