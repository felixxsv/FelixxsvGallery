<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Upload</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/upload.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__left">
      <div class="logo">Felixxsv Gallery</div>
      <div class="upcrumb">/gallery/upload</div>
    </div>
    <div class="hdr__right">
      <a class="btn uphdrbtn" href="/gallery/" aria-label="Back to Gallery">←</a>
    </div>
  </header>

  <main class="upmain">
    <section class="upcard" aria-label="upload">
      <div class="upgrid">
        <div class="uppreview">
          <div class="uppreview__imgwrap" id="upCoverWrap">
            <div class="upcoverph" id="upCoverPh">No image</div>
            <img class="uppreview__img" id="upCover" alt="" style="display:none">
          </div>
          <div class="uppreview__note">
            <div>※ 一番左の画像がサムネイルになります。</div>
            <div>ドラッグ＆ドロップで順番を入れ替えられます。</div>
          </div>
        </div>

        <div class="updrop">
          <div class="updrop__title">画像をアップロード</div>
          <div class="updrop__zone" id="upDrop" role="button" tabindex="0" aria-label="drop files">
            <div class="updrop__pill">UPLOAD</div>
            <div class="updrop__headline">画像をアップロード</div>
            <div class="updrop__sub">ここにドラッグ＆ドロップするか、クリックしてファイルを選択</div>
            <button class="updrop__btn" type="button" id="upPick">ファイルを選択</button>
            <div class="updrop__hint">.png .jpg .jpeg .webp / 最大50MB / 最大30枚</div>
            <input id="upFile" type="file" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp" multiple hidden>
          </div>
        </div>
      </div>

      <div class="upstripwrap" aria-label="strip">
        <div class="upstrip" id="upStrip">
          <div class="upthumb upthumb--empty" aria-hidden="true"></div>
          <div class="upthumb upthumb--empty" aria-hidden="true"></div>
          <div class="upthumb upthumb--empty" aria-hidden="true"></div>
          <div class="upthumb upthumb--empty" aria-hidden="true"></div>
          <div class="upthumb upthumb--empty" aria-hidden="true"></div>
        </div>
        <div class="upstriphelp">ドラッグ＆ドロップで順番を入れ替えられます</div>
      </div>

      <div class="upfields" aria-label="fields">
        <div class="upfield">
          <div class="upfield__label">タイトル（必須）</div>
          <input class="upinp" id="upTitle" type="text" maxlength="120" autocomplete="off">
        </div>

        <div class="upfield">
          <div class="upfield__label">説明文（ALT）（任意）</div>
          <textarea class="uparea" id="upAlt" maxlength="800"></textarea>
        </div>

        <div class="upfield">
          <div class="upfield__label">タグ（サジェスト）</div>
          <div class="uptagbox" id="upTagBox">
            <div class="uptagchips" id="upTagChips"></div>
            <input class="uptaginp" id="upTag" type="text" placeholder="タグを追加..." autocomplete="off">
            <button class="uptagadd" type="button" id="upTagAdd" aria-label="add tag">＋</button>
            <div class="uptagsug" id="upTagSug" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <div class="upbottom">
        <label class="utsw">
          <input type="checkbox" id="upPublic" checked>
          <span class="utsw__ui"></span>
          <span class="utsw__txt">公開 / 非公開</span>
        </label>

        <div class="upactions">
          <a class="upbtn" href="/gallery/">キャンセル</a>
          <button class="upbtn upbtn--primary" type="button" id="upSubmit">アップロード</button>
        </div>
      </div>

      <div class="upmsg" id="upMsg" aria-live="polite"></div>
    </section>
  </main>

  <script src="/gallery/upload.js"></script>
</body>
</html>
