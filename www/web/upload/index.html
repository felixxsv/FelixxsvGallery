<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Upload</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/upload.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__left">
      <div class="logo">Felixxsv Gallery</div>
      <div style="opacity:.7;font-size:12px;white-space:nowrap">/gallery/upload</div>
    </div>
    <div class="hdr__right">
      <a class="btn hdrbtn" href="/gallery/" aria-label="Back to Gallery">←</a>
    </div>
  </header>

  <main class="upmain">
    <section class="upcard">
      <div class="upgrid">
        <div class="uppreview">
          <div class="uppreview__imgwrap">
            <img class="uppreview__img" id="upCover" alt="">
          </div>
          <div class="uppreview__note">
            <div>※ 一番左の画像がサムネイルになります。</div>
            <div>ドラッグ＆ドロップで順番を入れ替えられます。</div>
          </div>
        </div>

        <div class="updrop">
          <div class="updrop__title">画像をアップロード</div>
          <div class="updrop__zone" id="upDrop">
            <div style="opacity:.9;font-weight:700">画像をアップロード</div>
            <div style="opacity:.75;font-size:12px;text-align:center">ここにドラッグ＆ドロップするか、クリックしてファイルを選択</div>
            <button class="updrop__btn" type="button" id="upPick">ファイルを選択</button>
            <div style="opacity:.75;font-size:12px">.png .jpg .jpeg .webp ・最大50MB</div>
            <input id="upFile" type="file" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp" multiple hidden>
          </div>
        </div>
      </div>

      <div class="upstripwrap">
        <div class="upstrip" id="upStrip"></div>
        <div style="opacity:.7;font-size:12px;text-align:center">ドラッグ＆ドロップで順番を入れ替えられます</div>
      </div>

      <div class="upfields">
        <div class="upfield">
          <div class="upfield__label">タイトル（必須）</div>
          <input class="upinp" id="upTitle" type="text">
        </div>

        <div class="upfield">
          <div class="upfield__label">説明文（ALT）（任意）</div>
          <textarea class="uparea" id="upAlt"></textarea>
        </div>

        <div class="upfield">
          <div class="upfield__label">タグ（サジェスト）</div>
          <div class="uptagbox">
            <input class="uptaginp" id="upTag" type="text" placeholder="タグを追加...">
            <button class="uptagadd" type="button" id="upTagAdd">＋</button>
          </div>
        </div>
      </div>

      <div class="upbottom">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="opacity:.85;font-size:12px">公開 / 非公開</div>
          <input type="checkbox" id="upPublic" checked>
        </div>

        <div class="upactions">
          <a class="upbtn" href="/gallery/">キャンセル</a>
          <button class="upbtn upbtn--primary" type="button" id="upSubmit">アップロード</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
