<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Felixxsv Gallery - Auth</title>
  <link rel="stylesheet" href="/gallery/common.css">
  <link rel="stylesheet" href="/gallery/auth.css">
  <link rel="stylesheet" href="/gallery/toast.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr__inner">
      <div class="hdr__left">
        <a class="hdr__logo" href="/gallery/">
          <span class="hdr__mark" aria-hidden="true"></span>
          <span class="hdr__title">Felixxsv Gallery</span>
        </a>
        <div class="hdr__crumb">Auth</div>
      </div>
      <div class="hdr__right">
        <a class="hdrbtn" href="/gallery/" aria-label="Back">←</a>
      </div>
    </div>
  </header>

  <main class="auth">
    <div class="authcard glass-strong">
      <div class="authtabs">
        <button id="tabLogin" class="btn btn-ghost is-on" type="button">Login</button>
        <button id="tabRegister" class="btn btn-ghost" type="button">Register</button>
      </div>

      <div id="paneLogin" class="authpane is-on">
        <div class="label">Email</div>
        <input id="loginEmail" class="inp" type="email" autocomplete="email">

        <div class="label">Password</div>
        <input id="loginPass" class="inp" type="password" autocomplete="current-password">

        <button id="loginBtn" class="btn btn-primary authbtn" type="button">Login</button>
      </div>

      <div id="paneRegister" class="authpane">
        <div class="label">Email</div>
        <input id="regEmail" class="inp" type="email" autocomplete="email">

        <div class="label">User Key</div>
        <input id="regKey" class="inp" type="text" placeholder="4-20 chars (A-Za-z0-9_-)" autocomplete="username">

        <div class="label">Display Name</div>
        <input id="regName" class="inp" type="text">

        <div class="label">Password</div>
        <input id="regPass" class="inp" type="password" autocomplete="new-password">

        <button id="regBtn" class="btn btn-primary authbtn" type="button">Create</button>
      </div>
    </div>
  </main>

  <script src="/gallery/auth.js"></script>
</body>
</html>
